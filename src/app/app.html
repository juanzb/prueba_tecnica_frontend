<main
  class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(120,119,198,0.3),rgba(255,255,255,0))] text-slate-800 font-sans selection:bg-indigo-100"
>
  <app-invoice />
</main>

<!-- Toaster para notificaciones -->
<ngx-sonner-toaster
  visibleToasts="3"
  position="bottom-left"
  duration="3000"
  [toastOptions]="{
    unstyled: true,
    classes: {
      toast:
        'group relative flex w-full items-start gap-4 overflow-hidden rounded-2xl border p-4 shadow-[0_15px_40px_rgba(0,0,0,0.5)] transition-all duration-300 min-w-[350px] backdrop-blur-2xl bg-slate-900/90',

      title: 'text-[12px] font-black uppercase tracking-widest drop-shadow-sm',
      description: 'text-[13px] text-slate-400 font-medium mt-1 leading-relaxed',

      success:
        'border-emerald-500/50 text-emerald-400 shadow-[inset_0_1px_1px_rgba(16,185,129,0.2)]',
      error: 'border-rose-500/50 text-rose-400 shadow-[inset_0_1px_1px_rgba(244,63,94,0.2)]',
      info: 'border-indigo-500/50 text-indigo-400 shadow-[inset_0_1px_1px_rgba(99,102,241,0.2)]',
      warning: 'border-amber-500/50 text-amber-400 shadow-[inset_0_1px_1px_rgba(245,158,11,0.2)]',
      loading: 'border-indigo-500/50 text-indigo-400 shadow-[inset_0_1px_1px_rgba(99,102,241,0.2)]',

      actionButton:
        'rounded-xl bg-indigo-500/20 border border-indigo-500/30 px-4 py-2 mt-2 text-[10px] font-bold uppercase tracking-widest text-indigo-300 hover:bg-indigo-500/30 transition-all active:scale-95 outline-none',
      cancelButton:
        'rounded-xl bg-white/5 border border-white/10 px-4 py-2 mt-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:bg-white/10 hover:text-white transition-all outline-none',
    },
  }"
/>
