@let item = detail();

<div
  class="flex items-center justify-between py-3 px-3 bg-slate-800/40 border border-white/5 hover:bg-slate-700/50 hover:border-white/10 transition-all duration-300 rounded-xl group backdrop-blur-sm shadow-sm"
>
  <div class="flex items-center gap-3">
    <div
      class="flex items-center justify-center p-1 bg-indigo-500/20 text-indigo-300 rounded-lg font-black text-xs border border-indigo-500/30 shadow-inner"
    >
      x{{ item.quantity }}
    </div>

    <div class="flex flex-col justify-center">
      <h4
        class="text-xs font-semibold text-slate-100 group-hover:text-white transition-colors line-clamp-1 leading-tight"
        title="{{ item.productName }}"
      >
        {{ item.productName }}
      </h4>
      <div class="flex items-center gap-1">
        <span class="text-[10px] text-slate-400 font-medium tracking-wide">
          Unidad:
          <span class="text-slate-300">{{
            item.unitPrice | currency: 'COP' : 'symbol' : '1.0-0'
          }}</span>
        </span>
      </div>
    </div>
  </div>

  <div class="text-right shrink-0">
    <p class="text-xs font-black text-slate-100 transition-colors drop-shadow-sm">
      {{ item.totalPrice | currency: 'COP' : 'symbol' : '1.0-0' }}
    </p>
  </div>
</div>
