@let product = this.productGet();

<div
  class="flex items-center justify-around p-3 border-b border-slate-100 last:border-0 hover:bg-slate-80/90 transition-colors rounded-lg group"
>
  <div class="flex items-center gap-4">
    <!-- Badge del ID Minimalista -->
    <span
      class="text-xs font-mono font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded-md group-hover:bg-slate-200 transition-colors"
    >
      #{{ product.id }}
    </span>

    <!-- Nombre y Descripción pequeña -->
    <div>
      <h3 class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">
        {{ product.name }}
      </h3>
      <p class="text-xs text-slate-400 truncate max-w-50">
        {{ product.description }}
      </p>
    </div>
  </div>

  <!-- Precio -->
  <div class="text-right">
    <span class="text-sm font-semibold text-slate-700">
      {{ product.unitPrice | currency: 'COP' : 'symbol' : '1.0-2' }}
    </span>
  </div>
</div>
