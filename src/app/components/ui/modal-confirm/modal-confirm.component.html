<div
  class="fixed inset-0 flex items-center justify-center bg-slate-950/60 backdrop-blur-sm z-50 transition-all"
  cdkTrapFocus
>
  <div
    class="bg-slate-800/70 rounded-3xl shadow-[0_0_50px_-12px_rgba(0,0,0,0.5)] border border-white/10 w-[90%] max-w-md p-6 relative backdrop-blur-2xl overflow-hidden transform transition-all scale-100"
  >
    <div
      class="absolute top-0 left-0 w-full h-1 bg-linear-to-r from-red-500/30 via-rose-500/50 to-red-500/30"
    ></div>

    <!-- Icono de advertencia o título -->
    <div class="flex flex-col items-center justify-center mt-2 mb-4">
      <h3 class="text-lg font-black text-white tracking-wide text-center">{{ title() }}</h3>
    </div>

    <!-- Mensaje -->
    <div class="px-2 mb-8 text-center">
      <p class="text-slate-400 text-sm leading-relaxed">
        {{ message() }}
      </p>
    </div>

    <!-- Botones -->
    <div class="flex justify-center gap-3 w-full">
      <button
        (click)="onCancel()"
        class="flex-1 cursor-pointer px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-slate-300 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 hover:text-white hover:border-white/20 transition-all duration-300 active:scale-95 outline-none"
      >
        {{ cancelButtonText() }}
      </button>

      <button
        (click)="onConfirm()"
        class="flex-1 cursor-pointer px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-red-100 bg-red-500/80 border border-red-500/50 rounded-xl hover:bg-red-500 hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] transition-all duration-300 focus:outline-none active:scale-95 shadow-inner outline-none"
      >
        {{ confirmButtonText() }}
      </button>
    </div>
  </div>
</div>
