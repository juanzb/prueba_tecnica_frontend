<div class="fixed inset-0 flex items-center justify-center bg-black/50 z-20" cdkTrapFocus>
  <div class="bg-white rounded-2xl shadow-2xl w-[50wh]! max-w-3xl p-6 relative max-h-[90vh]">
    <div class="p-2 border-gray-100 flex items-center justify-center">
      <h3 class="text-xl font-semibold text-gray-800">{{ title() }}</h3>
    </div>

    <div class="p-6">
      <p class="text-gray-600 text-base">
        {{ message() }}
      </p>
    </div>

    <div class="px-6 py-4 flex justify-center gap-x-6 h-20">
      <button
        (click)="onCancel()"
        class="h-full cursor-pointer px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 transition duration-150 ease-in-out active:scale-95"
      >
        {{ cancelButtonText() }}
      </button>

      <button
        (click)="onConfirm()"
        class="cursor-pointer px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition duration-150 ease-in-out focus:outline-none active:scale-95"
      >
        {{ confirmButtonText() }}
      </button>
    </div>
  </div>
</div>
