@let text = this.name();

<button
  (click)="this.clickButton()"
  class="relative flex items-center justify-center px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest transition-all duration-300 border backdrop-blur-md overflow-hidden group shadow-sm hover:shadow active:'bg-indigo-500/20 hover:bg-indigo-500/30 bg-white/10 border-white/10 text-slate-300 hover:text-white cursor-pointer active:scale-95 active:opacity-80"
>
  <div class="relative z-10 flex items-center gap-1">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
      />
    </svg>
    @if (text) {
      <span>{{ text }}</span>
    }
  </div>
</button>
