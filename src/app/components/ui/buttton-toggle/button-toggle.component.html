@let state = isActive();
@let txtActive = textActive();
@let txtInactive = textInactive();

<button
  (click)="toggle()"
  class="relative flex items-center justify-center px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest transition-all duration-300 border backdrop-blur-md overflow-hidden group shadow-sm hover:shadow cursor-pointer"
  [class]="
    state
      ? 'bg-indigo-500/20 border-indigo-500/30 text-indigo-300 hover:bg-indigo-500/30'
      : 'bg-white/10 border-white/10 text-slate-300 hover:bg-white/20 hover:text-white'
  "
>
  <div
    class="absolute inset-0 bg-linear-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-in-out"
  ></div>

  <div class="relative z-10 flex items-center gap-1.5">
    @if (state) {
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
        />
      </svg>
      @if (txtActive) {
        <span>{{ txtActive }}</span>
      }
    } @else {
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
        />
      </svg>
      @if (txtInactive) {
        <span>{{ txtInactive }}</span>
      }
    }
  </div>
</button>
