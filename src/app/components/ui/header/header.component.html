<section class="flex flex-row items-center h-[10vh] bg-slate-300 w-full">
  <div class="flex flex-row items-center h-full w-auto justify-start ml-2">
    @for (item of this.navItemsList; track $index) {
      <a
        class="flex flex-row items-center justify-center h-full w-[15vw] hover:bg-blue-400 active:bg-blue-600 active:text-white transition-all cursor-pointe"
        [routerLink]="item.path"
        [routerLinkActive]="'bg-blue-500 text-white shadow-md border-b-4 border-white font-bold'"
      >
        <p class="text-[20px] p-2">{{ item.label }}</p>
      </a>
    }
  </div>
</section>
